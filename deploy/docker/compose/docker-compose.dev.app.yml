# Application overlay for the dev stack — adds Livestock.Host + Workers
# on top of the infra defined in docker-compose.dev.yml. Use:
#
#   docker compose \
#     -f deploy/docker/compose/docker-compose.dev.yml \
#     -f deploy/docker/compose/docker-compose.dev.app.yml \
#     up -d
#
# On a server, the same overlay pulls pre-built images from Docker Hub
# instead of rebuilding (set HOST_IMAGE / WORKERS_IMAGE env vars).

name: livestock_dev

services:

  # ── Application ───────────────────────────────────────────────────────────────
  livestocktrading-host:
    image: ${HOST_IMAGE:-mstfaock/livestocktrading-backend:dev-latest}
    container_name: livestock-host
    build:
      context: ../../..
      dockerfile: deploy/docker/Dockerfile.host
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      nats:     { condition: service_healthy }
      minio:    { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=livestock_dev;Username=livestock;Password=livestock"
      ConnectionStrings__Redis: "redis:6379"
      ConnectionStrings__Nats: "nats://nats:4222"
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-dev-only-signing-key-min-32-chars-CHANGE-ME}"
      Seq__ServerUrl: "http://seq:80"
      OpenTelemetry__OtlpEndpoint: "http://jaeger:4317"
      Minio__Endpoint: "minio:9000"
      Minio__AccessKey: "minioadmin"
      Minio__SecretKey: "minioadmin123"
      Minio__UseSSL: "false"
      Minio__BucketName: "${MINIO_BUCKET:-livestocktrading-dev}"
    ports:
      - "5300:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Background workers (NATS consumers) ──────────────────────────────────────
  livestocktrading-workers:
    image: ${WORKERS_IMAGE:-mstfaock/livestocktrading-backend-workers:dev-latest}
    container_name: livestock-workers
    build:
      context: ../../..
      dockerfile: deploy/docker/Dockerfile.workers
    depends_on:
      nats:     { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=livestock_dev;Username=livestock;Password=livestock"
      ConnectionStrings__Nats: "nats://nats:4222"
      Seq__ServerUrl: "http://seq:80"
      OpenTelemetry__OtlpEndpoint: "http://jaeger:4317"
    restart: unless-stopped
