name: livestock_dev

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:17-3.5-alpine
    container_name: livestock-postgres
    environment:
      POSTGRES_DB: livestock_dev
      POSTGRES_USER: livestock
      POSTGRES_PASSWORD: livestock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livestock -d livestock_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: livestock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NATS JetStream ────────────────────────────────────────────────────────────
  nats:
    image: nats:2.11-alpine
    container_name: livestock-nats
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # Monitoring UI
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Jaeger (Distributed Tracing) ──────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:2
    container_name: livestock-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Seq (Structured Log UI) ───────────────────────────────────────────────────
  seq:
    image: datalust/seq:2024
    container_name: livestock-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"   # Seq UI (http://localhost:5341)
    volumes:
      - seq_data:/data

  # ── MinIO (S3-compatible file storage) ────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: livestock-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  nats_data:
  seq_data:
  minio_data:
