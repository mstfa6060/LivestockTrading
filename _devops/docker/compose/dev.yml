services:
  hirovo-api:
    image: ${REG}/hirovo-api:${TAG}
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ProjectConfigurations__EnvironmentConfiguration__EnvironmentName: "Development"
      ProjectConfigurations__EnvironmentConfiguration__ApiUrl: "${HIROVO_API_URL}"
      ProjectConfigurations__RelationalDbConfiguration__ConnectionString: "Server=sqlserver,1433;Database=maden_development;User Id=sa;Password=${SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=True;"
      # RabbitMQ
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__User: "${RABBITMQ_USER}"
      RabbitMq__Pass: "${RABBITMQ_PASS}"
      # Redis Cache
      Caching__Redis__ConnectionString: "redis:6379"
      Caching__Redis__InstanceName: "maden:"
      Caching__Redis__DefaultExpirationMinutes: "60"
    ports:
      - "${HIROVO_API_PORT}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      maden-network:
        aliases: [hirovo-api-container]
    restart: unless-stopped

  iam-api:
    image: ${REG}/maden-iam-api:${TAG}
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ProjectConfigurations__EnvironmentConfiguration__EnvironmentName: "Development"
      ProjectConfigurations__EnvironmentConfiguration__ApiUrl: "${IAM_API_URL}"
      ProjectConfigurations__RelationalDbConfiguration__ConnectionString: "Server=sqlserver,1433;Database=maden_development;User Id=sa;Password=${SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=True;"
      # Redis Cache
      Caching__Redis__ConnectionString: "redis:6379"
      Caching__Redis__InstanceName: "maden:"
      Caching__Redis__DefaultExpirationMinutes: "60"
    ports:
      - "${IAM_API_PORT}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      maden-network:
        aliases: [iam-api-container]
    restart: unless-stopped

  fileprovider-api:
    image: ${REG}/maden-fileprovider-api:${TAG}
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ProjectConfigurations__EnvironmentConfiguration__EnvironmentName: "Development"
      ProjectConfigurations__EnvironmentConfiguration__ApiUrl: "${FILEPROVIDER_API_URL}"
      ProjectConfigurations__RelationalDbConfiguration__ConnectionString: "Server=sqlserver,1433;Database=maden_development;User Id=sa;Password=${SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=True;"
      ProjectConfigurations__DocumentDbOptions__ConnectionString: "${MONGODB_CONNECTION_STRING}"
      ProjectConfigurations__DocumentDbOptions__DatabaseName: "${MONGODB_DATABASE_NAME}"
    ports:
      - "${FILEPROV_API_PORT}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      maden-network:
        aliases: [fileprovider-api-container]
    restart: unless-stopped

  # Keepzo API
  keepzo-api:
    image: ${REG}/keepzo-api:${TAG}
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ProjectConfigurations__EnvironmentConfiguration__EnvironmentName: "Development"
      ProjectConfigurations__EnvironmentConfiguration__ApiUrl: "${KEEPZO_API_URL}"
      ProjectConfigurations__RelationalDbConfiguration__ConnectionString: "Server=sqlserver,1433;Database=maden_development;User Id=sa;Password=${SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=True;"
    ports:
      - "${KEEPZO_API_PORT}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      maden-network:
        aliases: [keepzo-api-container]
    restart: unless-stopped

  #  AnimalMarket API
  animalmarket-api:
    image: ${REG}/animalmarket-api:${TAG}
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ProjectConfigurations__EnvironmentConfiguration__EnvironmentName: "Development"
      ProjectConfigurations__EnvironmentConfiguration__ApiUrl: "${ANIMALMARKET_API_URL}"
      ProjectConfigurations__RelationalDbConfiguration__ConnectionString: "Server=sqlserver,1433;Database=maden_development;User Id=sa;Password=${SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=True;"
      # RabbitMQ
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__User: "${RABBITMQ_USER}"
      RabbitMq__Pass: "${RABBITMQ_PASS}"
      # Redis Cache
      Caching__Redis__ConnectionString: "redis:6379"
      Caching__Redis__InstanceName: "maden:"
      Caching__Redis__DefaultExpirationMinutes: "60"
    ports:
      - "${ANIMALMARKET_API_PORT}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      maden-network:
        aliases: [animalmarket-api-container]
    restart: unless-stopped

  # Workers (Email)
  email-worker:
    image: ${REG}/hirovo-email-worker:${TAG}
    environment:
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__User: "${RABBITMQ_USER}"
      RabbitMq__Pass: "${RABBITMQ_PASS}"
      Brevo__SmtpHost: "${BREVO_SMTP_HOST}"
      Brevo__SmtpPort: "${BREVO_SMTP_PORT}"
      Brevo__SmtpUser: "${BREVO_SMTP_USER}"
      Brevo__SmtpPass: "${BREVO_SMTP_PASS}"
      Brevo__FromEmail: "${BREVO_FROM_EMAIL}"
      Brevo__FromName: "${BREVO_FROM_NAME}"
      SendGrid__ApiKey: "${SENDGRID_API_KEY}"
      SendGrid__FromEmail: "${SENDGRID_FROM_EMAIL}"
      SendGrid__FromName: "${SENDGRID_FROM_NAME}"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [maden-network]
    restart: unless-stopped

  iam-email-worker:
    image: ${REG}/iam-email-worker:${TAG}
    environment:
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__User: "${RABBITMQ_USER}"
      RabbitMq__Pass: "${RABBITMQ_PASS}"
      Brevo__SmtpHost: "${BREVO_SMTP_HOST}"
      Brevo__SmtpPort: "${BREVO_SMTP_PORT}"
      Brevo__SmtpUser: "${BREVO_SMTP_USER}"
      Brevo__SmtpPass: "${BREVO_SMTP_PASS}"
      Brevo__FromEmail: "${BREVO_FROM_EMAIL}"
      Brevo__FromName: "${BREVO_FROM_NAME}"
      SendGrid__ApiKey: "${SENDGRID_API_KEY}"
      SendGrid__FromEmail: "${SENDGRID_FROM_EMAIL}"
      SendGrid__FromName: "${SENDGRID_FROM_NAME}"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [maden-network]
    restart: unless-stopped

  animalmarket-email-worker:
    image: ${REG}/animalmarket-email-worker:${TAG}
    environment:
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__User: "${RABBITMQ_USER}"
      RabbitMq__Pass: "${RABBITMQ_PASS}"
      Brevo__SmtpHost: "${BREVO_SMTP_HOST}"
      Brevo__SmtpPort: "${BREVO_SMTP_PORT}"
      Brevo__SmtpUser: "${BREVO_SMTP_USER}"
      Brevo__SmtpPass: "${BREVO_SMTP_PASS}"
      Brevo__FromEmail: "${BREVO_FROM_EMAIL}"
      Brevo__FromName: "${BREVO_FROM_NAME}"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [maden-network]
    restart: unless-stopped

  #  AnimalMarket Notification Worker - DEV Database Connection
  animalmarket-notification-worker:
    image: ${REG}/animalmarket-notification-worker:${TAG}
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ProjectConfigurations__RelationalDbConfiguration__ConnectionString: "Server=sqlserver,1433;Database=maden_development;User Id=sa;Password=${SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=True;"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__User: "${RABBITMQ_USER}"
      RabbitMq__Pass: "${RABBITMQ_PASS}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    networks: [maden-network]
    restart: unless-stopped

  # Hangfire Scheduler
  hangfire-scheduler:
    image: ${REG}/hangfire-scheduler:${TAG}
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Hangfire: "Server=sqlserver,1433;Database=maden_development;User Id=sa;Password=${SA_PASSWORD};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=True;"
      ApplicationSettings__Urls__AnimalMarketApi: "http://animalmarket-api-container:8080"
      ApplicationSettings__Urls__AnimalMarket__CheckExpiredBids: "/AnimalBids/CheckExpiredBids"
      HangfireSettings__User__Username: "admin"
      HangfireSettings__User__Password: "Admin123!"
    ports:
      - "${HANGFIRE_PORT}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      animalmarket-api:
        condition: service_started
    networks: [maden-network]
    restart: unless-stopped

networks:
  maden-network:
    name: maden-network-dev
