# LivestockTrading - Production Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  web:
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  api-gateway:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  livestocktrading-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - /opt/livestocktrading/appsettings.Production.json:/app/appsettings.Production.json:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  iam-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - /opt/livestocktrading/appsettings.Production.json:/app/appsettings.Production.json:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  fileprovider-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - /opt/livestocktrading/appsettings.Production.json:/app/appsettings.Production.json:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  iam-mail-worker:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - /opt/livestocktrading/appsettings.Production.json:/app/appsettings.Production.json:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  iam-sms-worker:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - /opt/livestocktrading/appsettings.Production.json:/app/appsettings.Production.json:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  livestocktrading-notification-worker:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - /opt/livestocktrading/appsettings.Production.json:/app/appsettings.Production.json:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  livestocktrading-socialmedia-worker:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - /opt/livestocktrading/appsettings.Production.json:/app/appsettings.Production.json:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  sqlserver:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  redis:
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
