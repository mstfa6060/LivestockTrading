# LivestockTrading - Base Docker Compose
# This file contains common service definitions

x-common-env: &common-env
  ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
  ConnectionStrings__SqlConnectionString: ${SQL_CONNECTION_STRING}
  RabbitMq__Host: rabbitmq
  RabbitMq__Port: "5672"
  RabbitMq__User: ${RABBITMQ_USER:-guest}
  RabbitMq__Pass: ${RABBITMQ_PASS:-guest}
  Caching__Redis__ConnectionString: "redis:6379"
  Caching__Redis__InstanceName: "livestocktrading:"
  MinIO__Endpoint: "minio:9000"
  MinIO__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
  MinIO__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
  MinIO__UseSSL: "false"
  MinIO__BucketName: ${MINIO_BUCKET_NAME:-livestocktrading}

networks:
  livestocktrading-network:
    driver: bridge

volumes:
  sqlserver-data:
  redis-data:
  minio-data:
  file-storage:

services:
  # Infrastructure Services
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: livestocktrading-sqlserver
    environment:
      SA_PASSWORD: ${SA_PASSWORD:-YourStrong@Passw0rd}
      ACCEPT_EULA: "Y"
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - livestocktrading-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD:-YourStrong@Passw0rd} -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: livestocktrading-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    networks:
      - livestocktrading-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: livestocktrading-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - livestocktrading-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: livestocktrading-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - livestocktrading-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Application Services
  livestocktrading-api:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/livestocktrading-api:${TAG:-latest}
    container_name: livestocktrading-api
    environment:
      <<: *common-env
    ports:
      - "${GLOBALLIVESTOCK_API_PORT:-5001}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - livestocktrading-network
    restart: unless-stopped

  iam-api:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/livestocktrading-iam-api:${TAG:-latest}
    container_name: livestocktrading-iam-api
    environment:
      <<: *common-env
    ports:
      - "${IAM_API_PORT:-5002}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - livestocktrading-network
    restart: unless-stopped

  fileprovider-api:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/livestocktrading-fileprovider-api:${TAG:-latest}
    container_name: livestocktrading-fileprovider-api
    environment:
      <<: *common-env
    ports:
      - "${FILEPROVIDER_API_PORT:-5003}:8080"
    volumes:
      - file-storage:/app/wwwroot/storage
    depends_on:
      sqlserver:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - livestocktrading-network
    restart: unless-stopped

  # Workers
  iam-mail-worker:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/livestocktrading-iam-mail-worker:${TAG:-latest}
    container_name: livestocktrading-iam-mail-worker
    environment:
      <<: *common-env
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST}
      BREVO_SMTP_PORT: ${BREVO_SMTP_PORT}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER}
      BREVO_SMTP_PASS: ${BREVO_SMTP_PASS}
      BREVO_FROM_EMAIL: ${BREVO_FROM_EMAIL}
      BREVO_FROM_NAME: ${BREVO_FROM_NAME}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - livestocktrading-network
    restart: unless-stopped

  iam-sms-worker:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/livestocktrading-iam-sms-worker:${TAG:-latest}
    container_name: livestocktrading-iam-sms-worker
    environment:
      <<: *common-env
      NETGSM_USERNAME: ${NETGSM_USERNAME}
      NETGSM_PASSWORD: ${NETGSM_PASSWORD}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - livestocktrading-network
    restart: unless-stopped
