# GlobalLivestock - Base Docker Compose
# This file contains common service definitions

x-common-env: &common-env
  ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
  ConnectionStrings__SqlConnectionString: ${SQL_CONNECTION_STRING}
  RabbitMq__Host: rabbitmq
  RabbitMq__Port: "5672"
  RabbitMq__User: ${RABBITMQ_USER:-guest}
  RabbitMq__Pass: ${RABBITMQ_PASS:-guest}
  Caching__Redis__ConnectionString: "redis:6379"

networks:
  globallivestock-network:
    driver: bridge

volumes:
  sqlserver-data:
  redis-data:
  file-storage:

services:
  # Infrastructure Services
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD:-YourStrong@Passw0rd}
      ACCEPT_EULA: "Y"
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - globallivestock-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD:-YourStrong@Passw0rd} -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    networks:
      - globallivestock-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - globallivestock-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Application Services
  globallivestock-api:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/globallivestock-api:${TAG:-latest}
    environment:
      <<: *common-env
    ports:
      - "${GLOBALLIVESTOCK_API_PORT:-5001}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - globallivestock-network
    restart: unless-stopped

  iam-api:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/globallivestock-iam-api:${TAG:-latest}
    environment:
      <<: *common-env
    ports:
      - "${IAM_API_PORT:-5002}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - globallivestock-network
    restart: unless-stopped

  fileprovider-api:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/globallivestock-fileprovider-api:${TAG:-latest}
    environment:
      <<: *common-env
    ports:
      - "${FILEPROVIDER_API_PORT:-5003}:8080"
    volumes:
      - file-storage:/app/wwwroot/storage
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - globallivestock-network
    restart: unless-stopped

  # Workers
  iam-mail-worker:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/globallivestock-iam-mail-worker:${TAG:-latest}
    environment:
      <<: *common-env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - globallivestock-network
    restart: unless-stopped

  iam-sms-worker:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/globallivestock-iam-sms-worker:${TAG:-latest}
    environment:
      <<: *common-env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - globallivestock-network
    restart: unless-stopped
