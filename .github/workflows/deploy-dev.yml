name: Deploy DEV

on:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  TAG: dev-latest
  DOCKER_USERNAME: mstfaock

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: livestocktrading-api
            dockerfile: _devops/docker/Dockerfile.livestocktrading-api
            image: livestocktrading-api
          - name: iam-api
            dockerfile: _devops/docker/Dockerfile.iam-api
            image: livestocktrading-iam-api
          - name: fileprovider-api
            dockerfile: _devops/docker/Dockerfile.fileprovider-api
            image: livestocktrading-fileprovider-api
          - name: iam-mail-worker
            dockerfile: _devops/docker/Dockerfile.iam-mail-worker
            image: livestocktrading-iam-mail-worker
          - name: iam-sms-worker
            dockerfile: _devops/docker/Dockerfile.iam-sms-worker
            image: livestocktrading-iam-sms-worker
          - name: resource-seeder
            dockerfile: _devops/docker/Dockerfile.resource-seeder
            image: livestocktrading-resource-seeder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ matrix.image }}:${{ env.TAG }}
            ${{ env.DOCKER_USERNAME }}/${{ matrix.image }}:dev-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ matrix.image }}:cache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ matrix.image }}:cache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to DEV Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_KEY }}
          script: |
            cd /opt/livestocktrading

            echo "📥 Git repository güncelleniyor..."
            git fetch origin dev
            git reset --hard origin/dev
            git submodule update --init --recursive

            echo "🐳 Docker image'ları pull ediliyor..."
            docker compose -p livestock_dev \
              -f docker-compose.yml \
              -f docker-compose.dev.yml \
              --env-file .env.dev pull

            echo "🌱 ResourceSeeder çalıştırılıyor..."
            docker run --rm \
              --network livestock_dev_default \
              --env-file .env.dev \
              mstfaock/livestocktrading-resource-seeder:dev-latest \
              development || echo "⚠️ ResourceSeeder failed but continuing..."

            echo "🚀 Servisler başlatılıyor..."
            docker compose -p livestock_dev \
              -f docker-compose.yml \
              -f docker-compose.dev.yml \
              --env-file .env.dev up -d

            echo "🧹 Temizlik yapılıyor..."
            docker image prune -f

            echo "✅ DEV deployment tamamlandı!"

            echo "📊 Container durumu:"
            docker compose -p livestock_dev ps
