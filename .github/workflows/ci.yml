name: CI - Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore GlobalLivestock.sln

      - name: Build
        run: dotnet build GlobalLivestock.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GlobalLivestock.sln --configuration Release --no-build --verbosity normal
        continue-on-error: true
