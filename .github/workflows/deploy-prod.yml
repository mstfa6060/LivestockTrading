name: Deploy PROD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  TAG: latest
  DOCKER_USERNAME: mstfaock

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: livestocktrading-api
            dockerfile: docker/Dockerfile.livestocktrading-api
            image: livestocktrading-api
          - name: iam-api
            dockerfile: docker/Dockerfile.iam-api
            image: livestocktrading-iam-api
          - name: fileprovider-api
            dockerfile: docker/Dockerfile.fileprovider-api
            image: livestocktrading-fileprovider-api
          - name: iam-mail-worker
            dockerfile: docker/Dockerfile.iam-mail-worker
            image: livestocktrading-iam-mail-worker
          - name: iam-sms-worker
            dockerfile: docker/Dockerfile.iam-sms-worker
            image: livestocktrading-iam-sms-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ matrix.image }}:${{ env.TAG }}
            ${{ env.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ matrix.image }}:cache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ matrix.image }}:cache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to PROD Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_KEY }}
          script: |
            cd /opt/livestocktrading

            echo "📥 Git repository güncelleniyor..."
            git fetch origin main
            git reset --hard origin/main
            git submodule update --init --recursive

            echo "🐳 Docker image'ları pull ediliyor..."
            docker compose -p livestock_prod \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --env-file .env.prod pull

            echo "🚀 Servisler başlatılıyor..."
            docker compose -p livestock_prod \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --env-file .env.prod up -d

            echo "🧹 Temizlik yapılıyor..."
            docker image prune -f

            echo "✅ PROD deployment tamamlandı!"

            echo "📊 Container durumu:"
            docker compose -p livestock_prod ps
