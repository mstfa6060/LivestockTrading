name: Deploy PROD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: livestocktrading-api
            dockerfile: docker/Dockerfile.livestocktrading-api
            image: ${{ secrets.DOCKER_USERNAME }}/livestocktrading-api
          - name: iam-api
            dockerfile: docker/Dockerfile.iam-api
            image: ${{ secrets.DOCKER_USERNAME }}/livestocktrading-iam-api
          - name: fileprovider-api
            dockerfile: docker/Dockerfile.fileprovider-api
            image: ${{ secrets.DOCKER_USERNAME }}/livestocktrading-fileprovider-api
          - name: iam-mail-worker
            dockerfile: docker/Dockerfile.iam-mail-worker
            image: ${{ secrets.DOCKER_USERNAME }}/livestocktrading-iam-mail-worker
          - name: iam-sms-worker
            dockerfile: docker/Dockerfile.iam-sms-worker
            image: ${{ secrets.DOCKER_USERNAME }}/livestocktrading-iam-sms-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ env.TAG }}
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ matrix.image }}:cache
          cache-to: type=registry,ref=${{ matrix.image }}:cache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to PROD Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_KEY }}
          script: |
            cd /opt/livestocktrading

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Deploy
            docker compose -f docker-compose.prod.yml up -d

            # Run migrations
            docker compose -f docker-compose.prod.yml exec -T livestocktrading-api dotnet ef database update || true

            # Cleanup
            docker image prune -f
